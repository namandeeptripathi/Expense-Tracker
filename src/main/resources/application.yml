spring:
  application:
    name: expense-tracker
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:expense_tracker}?useSSL=true&requireSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:expense_tracker}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

expense-tracker:
  api:
    title: Expense Tracker API
    description: REST API for tracking personal expenses.
    version: v1
  security:
    jwt:
      # Set JWT_SECRET to a Base64-encoded random value of at least 32 bytes.
      secret: ${JWT_SECRET:}
      issuer: ${JWT_ISSUER:expense-tracker}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:15m}
      refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:7d}

logging:
  level:
    root: INFO
    com.namandeep.expensetracker: INFO
